server:
  port: 8084

spring:
  application:
    name: ci-cd-service

  # Database Connection (To track our Build Jobs)
  datasource:
    url: jdbc:postgresql://localhost:5432/cicd_db?options=-c%20timezone=Asia/Kolkata
    username: devflow
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  # Kafka Consumer (Listening for the Vault's megaphone)
  kafka:
    consumer:
      bootstrap-servers: localhost:9092
      group-id: cicd-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# Eureka Registration
eureka:
  instance:
    prefer-ip-address: true
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/