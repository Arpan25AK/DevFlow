server:
  port: 8085

spring:
  application:
    name: code-review-service

  # PostgreSQL Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/code_review_db
    username: devflow
    password: password
  jpa:
    hibernate:
      ddl-auto: update # Useful for dev, change to 'validate' for prod
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Kafka Configuration
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: code-review-group

# Eureka Service Discovery Configuration
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true