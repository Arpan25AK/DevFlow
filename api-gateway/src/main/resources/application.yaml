server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webmvc:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:
            - id: auth-service-route
              uri: lb://auth-service
              predicates:
                - Path=/api/auth/**

            - id: repository-service-route
              uri: lb://repository-service
              predicates:
                - Path=/api/repositories/**

            - id: cicd-service
              uri: lb://ci-cd-service
              predicates:
                - Path=/api/cicd/**

            - id: code-review-service-route
              uri: lb://code-review-service
              predicates:
                - Path=/api/reviews/**

            - id: chat-service-route
              uri: lb://chat-service
              predicates:
                - Path=/api/chat/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

jwt:
